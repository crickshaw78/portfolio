  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;

      color: #e6e6e9;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 520px; text-align: center; }
    .code {
      font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace;
      font-size: 13px;
      color: #54545b;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }
    h1 { font-size: clamp(36px, 6vw, 56px); font-weight: 700; letter-spacing: -0.025em; margin-bottom: 14px; line-height: 1.1; }
    .hint { color: #8a8a92; font-size: 16px; margin-bottom: 28px; }

    a.btn {

      font-weight: 600;
      font-size: 14px;
      transition: background .2s ease;
    }

    .term {
      margin-top: 36px;

    .term .ko { color: #b06b5a; font-weight: 600; }

<body>
  <main class="wrap">
    <p class="code">Error · 404</p>
    <h1>This page <span style="color:#c9a46a;font-style:italic;font-weight:500">went offline.</span></h1>
    <p class="hint">The URL you requested doesn't exist on <code>crickshaw.dev</code>. It may have moved, or the link you followed may be wrong.</p>
    <a class="btn" href="/">← Back to homepage</a>

    <div class="term" aria-hidden="true">
      <span class="mt">$</span> curl -I https://crickshaw.dev<span id="path"></span><br/>

    </div>
  </main>
  <script>
    document.getElementById('path').textContent = location.pathname;
  </script>
